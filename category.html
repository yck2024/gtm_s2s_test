<html lang="en">
<head>

    <style>
        body { font-family: Arial, sans-serif; }
        .products { display: flex; flex-wrap: wrap; gap: 20px; }
        .product { border: 1px solid #ccc; padding: 10px; width: 200px; text-align: center; }
        .product img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NV9C4RXV"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <header>
        <h1>Our Products</h1>
        <nav>
            <a href="index.html">Home</a> |
            <a href="category.html">Products</a> |
            <a href="cart.html">Cart</a> |
            <a href="conversion.html">Conversion</a>
        </nav>
    </header>
    <main>
        <div id="product-list" class="products"></div>
    </main>
    <footer>
        <p>&copy; 2024 My E-Commerce Site</p>
    </footer>
    <script>
        const products = [
            { id: 1, title: "Laptop", description: "A powerful laptop for all your needs.", link: "product.html?id=1", image_link: "https://cdn.stocksnap.io/img-thumbs/280h/laptop-typing_YBKJ1G35EX.jpg", price: 1200, brand: "TechCorp" },
            { id: 2, title: "Mouse", description: "A comfortable, ergonomic mouse.", link: "product.html?id=2", image_link: "https://cdn.stocksnap.io/img-thumbs/280h/hand-mouse_R538BDNPAT.jpg", price: 25, brand: "TechCorp" },
            { id: 3, title: "Keyboard", description: "A mechanical keyboard with RGB lighting.", link: "product.html?id=3", image_link: "https://cdn.stocksnap.io/img-thumbs/280h/keyboard-typing_WTGTEOHQ8X.jpg", price: 75, brand: "TechCorp" },
            { id: 4, title: "Monitor", description: "A 27-inch 4K monitor.", link: "product.html?id=4", image_link: "https://cdn.stocksnap.io/img-thumbs/280h/desktop-computer_25WP90QOLT.jpg", price: 300, brand: "ViewSonic" },
            { id: 5, title: "Webcam", description: "A 1080p webcam for video conferencing.", link: "product.html?id=5", image_link: "https://cdn.stocksnap.io/img-thumbs/280h/video-camera_RW5R1EB5RC.jpg", price: 50, brand: "Logi" },
            { id: 6, title: "Headphones", description: "Noise-cancelling headphones.", link: "product.html?id=6", image_link: "https://cdn.stocksnap.io/img-thumbs/280h/headphones-desk_KKOQ2ZWHO1.jpg", price: 150, brand: "SoundMagic" }
        ];

        const productList = document.getElementById('product-list');
        products.forEach(product => {
            const productDiv = document.createElement('div');
            productDiv.className = 'product';
            productDiv.innerHTML = `
                <a href="${product.link}">
                    <img src="${product.image_link}" alt="${product.title}">
                    <h2>${product.title}</h2>
                    <p>$${product.price}</p>
                </a>
            `;
            productList.appendChild(productDiv);
        });
    </script>
</body>
</html>
